<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Under Maintenance | We'll Be Back Soon</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e2e8f0;
            padding: 20px;
        }

        .maintenance-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 32px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .maintenance-card:hover {
            transform: translateY(-5px);
            border-color: #f97316;
        }

        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(to right, #f97316, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.2;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(249, 115, 22, 0.3);
        }

        .gear-icon {
            font-size: 60px;
            color: #f97316;
            margin-bottom: 20px;
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #f8fafc;
            letter-spacing: -0.5px;
        }

        .maintenance-title {
            font-size: 24px;
            font-weight: 500;
            color: #facc15;
            margin-bottom: 20px;
            border-bottom: 1px dashed #475569;
            padding-bottom: 20px;
        }

        .message {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: #334155;
            border-radius: 10px;
            margin-bottom: 40px;
            overflow: hidden;
        }

        .progress-bar {
            width: 70%;
            height: 100%;
            background: linear-gradient(90deg, #f97316, #facc15);
            border-radius: 10px;
            animation: loading 2.5s ease-in-out infinite alternate;
        }

        @keyframes loading {
            0% { width: 60%; opacity: 0.7; }
            100% { width: 85%; opacity: 1; }
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #f97316;
            color: #0f172a;
            border: none;
            padding: 16px 36px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid #f97316;
            box-shadow: 0 8px 20px -6px #f9731666;
            margin-bottom: 25px;
        }

        .home-button i {
            font-size: 20px;
            transition: transform 0.2s;
        }

        .home-button:hover {
            background: transparent;
            color: #f97316;
            box-shadow: 0 8px 20px -6px #f97316;
        }

        .home-button:hover i {
            transform: translateX(-5px);
        }

        .footer-note {
            color: #64748b;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .footer-note i {
            color: #ef4444;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 30px 20px;
            }
            .error-code {
                font-size: 90px;
            }
            h1 {
                font-size: 26px;
            }
            .maintenance-title {
                font-size: 20px;
            }
            .home-button {
                padding: 14px 28px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <!-- Animated Gear Icon -->
        <div class="gear-icon">
            <i class="fas fa-cog"></i>
        </div>

        <!-- 404 Code -->
        <div class="error-code">404</div>

        <!-- English Heading -->
        <h1>Oops! Page Not Found</h1>
        
        <!-- Maintenance Sub-heading -->
        <div class="maintenance-title">
            <i class="fas fa-tools" style="margin-right: 10px;"></i> 
            Under Maintenance
            <i class="fas fa-tools" style="margin-left: 10px;"></i>
        </div>

        <!-- English Message -->
        <div class="message">
            The page you are looking for is currently undergoing scheduled maintenance.<br>
            <strong>We'll be back online shortly!</strong>
        </div>

        <!-- Status Badge -->
        <div class="status-badge">
            <i class="fas fa-exclamation-triangle"></i> HTTP 404 - NOT FOUND (Maintenance Mode)
        </div>

        <!-- Animated Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- Button -->
        <a href="/" class="home-button">
            <i class="fas fa-arrow-left"></i> 
            Back to Homepage
            <i class="fas fa-home" style="margin-left: 5px;"></i>
        </a>

        <!-- Footer Info -->
        <div class="footer-note">
            <i class="fas fa-circle"></i>
            <span>Estimated Time Remaining: 30-45 Minutes</span>
            <i class="fas fa-circle"></i>
        </div>
    </div>
</body>
</html>
