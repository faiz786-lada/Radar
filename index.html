<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Radar System | Arduino + Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #1a1f2f;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a3142;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .title {
            color: #00ff88;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #00ff88;
        }

        .mode-badge {
            background: #2a3142;
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #00ff88;
        }

        .radar-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #000000;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
        }

        #radarCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: #2a3142;
            border: none;
            color: white;
            padding: 15px 5px;
            border-radius: 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #3a4152;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn.active {
            background: #00ff88;
            color: #1a1f2f;
            border-color: #00ff88;
            box-shadow: 0 0 20px #00ff88;
        }

        .btn i {
            font-size: 20px;
        }

        .status-panel {
            background: #2a3142;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #3a4152;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: #8892b0;
            font-size: 14px;
        }

        .status-value {
            color: #00ff88;
            font-weight: bold;
            font-size: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #1a1f2f;
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            height: 100%;
            background: #00ff88;
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #00ff88;
        }

        .target-list {
            max-height: 150px;
            overflow-y: auto;
            background: #1a1f2f;
            border-radius: 15px;
            padding: 10px;
        }

        .target-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #2a3142;
            color: #8892b0;
            font-size: 13px;
        }

        .target-item:last-child {
            border-bottom: none;
        }

        .target-distance {
            color: #00ff88;
            font-weight: bold;
        }

        .connection-panel {
            background: #2a3142;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
        }

        .port-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        select {
            flex: 1;
            background: #1a1f2f;
            color: white;
            border: 1px solid #3a4152;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .connect-btn {
            background: #00ff88;
            color: #1a1f2f;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            color: #4a5162;
            font-size: 12px;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1f2f;
        }

        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 5px;
        }

        /* Animation */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .pulse {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">⚡ RADAR SYSTEM</div>
            <div class="mode-badge" id="modeDisplay">SIMULATION MODE</div>
        </div>

        <div class="radar-container">
            <canvas id="radarCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn" id="simModeBtn" onclick="setMode('sim')">
                <span>🔄</span>
                <span>Simulation</span>
            </button>
            <button class="btn" id="arduinoModeBtn" onclick="setMode('arduino')">
                <span>🔌</span>
                <span>Arduino</span>
            </button>
            <button class="btn" onclick="addRandomTarget()">
                <span>➕</span>
                <span>Add</span>
            </button>
            <button class="btn" onclick="clearTargets()">
                <span>🗑️</span>
                <span>Clear</span>
            </button>
        </div>

        <div class="status-panel">
            <div class="status-row">
                <span>Current Angle</span>
                <span class="status-value" id="currentAngle">90°</span>
            </div>
            <div class="status-row">
                <span>Scan Speed</span>
                <span class="status-value" id="scanSpeed">1.5x</span>
            </div>
            <div class="status-row">
                <span>Targets Detected</span>
                <span class="status-value" id="targetCount">0</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="scanProgress" style="width: 50%;"></div>
            </div>
        </div>

        <div class="target-list" id="targetList">
            <div class="target-item" style="justify-content: center; color: #4a5162;">
                No targets detected
            </div>
        </div>

        <div class="connection-panel" id="arduinoPanel" style="display: none;">
            <div class="port-selector">
                <select id="portSelect">
                    <option value="">Select Port</option>
                </select>
                <button class="connect-btn" onclick="connectArduino()" id="connectBtn">Connect</button>
            </div>
            <div style="color: #8892b0; font-size: 12px; text-align: center;" id="connectionStatus">
                🔴 Disconnected
            </div>
        </div>

        <div class="footer">
            <span id="fps">60</span> FPS | 180° Scanning | Touch to add targets
        </div>
    </div>

    <script>
        // Radar Configuration
        let canvas, ctx;
        let radarX, radarY, radarRadius;
        let scanAngle = 90;
        let scanDirection = 1;
        let scanSpeed = 1.5;
        let targets = [];
        let particles = [];
        
        // Mode
        let currentMode = 'sim'; // 'sim' or 'arduino'
        let arduinoConnected = false;
        let serialPort = null;
        
        // Animation
        let animationId;
        let lastTimestamp = 0;
        let fps = 60;
        
        // Initialize canvas
        function initCanvas() {
            canvas = document.getElementById('radarCanvas');
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Add sample targets for simulation
            addSampleTargets();
            
            // Start animation
            animate();
        }
        
        function resizeCanvas() {
            const container = document.querySelector('.radar-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            radarX = canvas.width / 2;
            radarY = canvas.height / 2;
            radarRadius = Math.min(canvas.width, canvas.height) * 0.4;
        }
        
        function animate(timestamp) {
            // Calculate FPS
            if (lastTimestamp) {
                fps = 1000 / (timestamp - lastTimestamp);
                document.getElementById('fps').textContent = Math.round(fps);
            }
            lastTimestamp = timestamp;
            
            // Clear canvas with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw radar components
            drawRadarBase();
            drawTargets();
            drawScanLine();
            drawParticles();
            
            // Update scan angle
            updateScanAngle();
            
            // Update particles
            updateParticles();
            
            // Update UI
            updateUI();
            
            animationId = requestAnimationFrame(animate);
        }
        
        function drawRadarBase() {
            ctx.save();
            ctx.translate(radarX, radarY);
            
            // Draw distance circles
            for (let i = 1; i <= 5; i++) {
                let r = radarRadius * i / 5;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 255, 136, ${0.2 - i * 0.03})`;
                ctx.stroke();
                
                // Distance labels
                ctx.fillStyle = '#00ff88';
                ctx.font = '10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText((i * 20) + 'cm', r - 15, -10);
            }
            
            // Draw angle lines
            for (let angle = 0; angle <= 180; angle += 30) {
                let rad = (angle - 90) * Math.PI / 180;
                let x = Math.cos(rad) * radarRadius;
                let y = Math.sin(rad) * radarRadius;
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(x, y);
                ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
                ctx.stroke();
                
                // Angle labels
                if (angle % 30 === 0 && angle !== 90) {
                    ctx.fillStyle = '#00ff88';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(angle + '°', x * 1.1, y * 1.1);
                }
            }
            
            // Center point
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#00ff88';
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawScanLine() {
            ctx.save();
            ctx.translate(radarX, radarY);
            
            let rad = (scanAngle - 90) * Math.PI / 180;
            let x = Math.cos(rad) * radarRadius;
            let y = Math.sin(rad) * radarRadius;
            
            // Draw scan cone
            for (let i = 0; i < 5; i++) {
                let alpha = 0.2 - i * 0.04;
                let offset = 10 * (i * 0.1);
                
                let leftRad = (scanAngle - 90 - offset) * Math.PI / 180;
                let rightRad = (scanAngle - 90 + offset) * Math.PI / 180;
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(leftRad) * radarRadius * 0.8, Math.sin(leftRad) * radarRadius * 0.8);
                ctx.lineTo(Math.cos(rightRad) * radarRadius * 0.8, Math.sin(rightRad) * radarRadius * 0.8);
                ctx.closePath();
                ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
                ctx.fill();
            }
            
            // Draw main scan line
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(x, y);
            ctx.strokeStyle = '#00ff88';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw scanning dot
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            ctx.restore();
            
            // Detect targets
            detectTargets();
        }
        
        function drawTargets() {
            for (let i = targets.length - 1; i >= 0; i--) {
                let t = targets[i];
                
                // Update target
                t.life -= 0.5;
                t.detectionIntensity = Math.max(0, t.detectionIntensity - 3);
                
                // Remove expired targets
                if (t.life <= 0) {
                    // Create particles
                    for (let j = 0; j < 5; j++) {
                        particles.push({
                            x: t.x,
                            y: t.y,
                            vx: (Math.random() - 0.5) * 2,
                            vy: (Math.random() - 0.5) * 2,
                            life: 255,
                            size: Math.random() * 5 + 2
                        });
                    }
                    targets.splice(i, 1);
                    continue;
                }
                
                // Draw target
                ctx.save();
                ctx.translate(radarX + t.x, radarY + t.y);
                
                // Color based on distance
                let color;
                if (t.distance < 30) color = '#ff0000';
                else if (t.distance < 60) color = '#ffff00';
                else color = '#00ff00';
                
                // Apply detection intensity
                if (t.detectionIntensity > 0) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${t.detectionIntensity/255})`;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-10, -10, 20, 20);
                }
                
                // Draw target
                ctx.beginPath();
                ctx.arc(0, 0, t.size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = t.life / 255;
                ctx.fill();
                
                // Draw distance ring
                ctx.beginPath();
                ctx.arc(0, 0, t.size * 2, 0, Math.PI * 2);
                ctx.strokeStyle = color;
                ctx.globalAlpha = t.life / 510;
                ctx.stroke();
                
                // Draw distance text if detected
                if (t.detectionIntensity > 100) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(t.distance + 'cm', 0, -20);
                }
                
                ctx.restore();
            }
        }
        
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                
                // Update particle
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 5;
                p.size *= 0.98;
                
                // Remove dead particles
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                // Draw particle
                ctx.save();
                ctx.translate(radarX + p.x, radarY + p.y);
                ctx.beginPath();
                ctx.arc(0, 0, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 136, ${p.life/255})`;
                ctx.fill();
                ctx.restore();
            }
        }
        
        function detectTargets() {
            for (let t of targets) {
                let angleDiff = Math.abs(t.angle - scanAngle);
                
                if (angleDiff < 10) {
                    t.detectionIntensity = Math.min(255, t.detectionIntensity + 20);
                    t.life = 255;
                    
                    // Create particles
                    if (Math.random() < 0.3) {
                        particles.push({
                            x: t.x,
                            y: t.y,
                            vx: (Math.random() - 0.5) * 2,
                            vy: (Math.random() - 0.5) * 2,
                            life: 255,
                            size: Math.random() * 5 + 2
                        });
                    }
                }
            }
        }
        
        function updateScanAngle() {
            scanAngle += scanDirection * scanSpeed;
            
            if (scanAngle >= 165) {
                scanAngle = 165;
                scanDirection = -1;
            } else if (scanAngle <= 15) {
                scanAngle = 15;
                scanDirection = 1;
            }
        }
        
        function updateParticles() {
            // Add random particles
            if (Math.random() < 0.1) {
                let angle = Math.random() * Math.PI * 2;
                let dist = Math.random() * radarRadius * 0.8 + radarRadius * 0.2;
                particles.push({
                    x: Math.cos(angle) * dist,
                    y: Math.sin(angle) * dist,
                    vx: (Math.random() - 0.5) * 1,
                    vy: (Math.random() - 0.5) * 1,
                    life: 255,
                    size: Math.random() * 3 + 1
                });
            }
        }
        
        function updateUI() {
            document.getElementById('currentAngle').textContent = Math.round(scanAngle) + '°';
            document.getElementById('scanSpeed').textContent = scanSpeed.toFixed(1) + 'x';
            document.getElementById('targetCount').textContent = targets.length;
            
            let progress = ((scanAngle - 15) / 150) * 100;
            document.getElementById('scanProgress').style.width = progress + '%';
            
            // Update target list
            let targetList = document.getElementById('targetList');
            if (targets.length === 0) {
                targetList.innerHTML = '<div class="target-item" style="justify-content: center; color: #4a5162;">No targets detected</div>';
            } else {
                targetList.innerHTML = targets.map(t => `
                    <div class="target-item">
                        <span>🎯 Target at ${Math.round(t.angle)}°</span>
                        <span class="target-distance">${t.distance}cm</span>
                    </div>
                `).join('');
            }
        }
        
        // Mode Management
        function setMode(mode) {
            currentMode = mode;
            
            document.getElementById('simModeBtn').classList.toggle('active', mode === 'sim');
            document.getElementById('arduinoModeBtn').classList.toggle('active', mode === 'arduino');
            document.getElementById('arduinoPanel').style.display = mode === 'arduino' ? 'block' : 'none';
            document.getElementById('modeDisplay').textContent = mode === 'sim' ? 'SIMULATION MODE' : 'ARDUINO MODE';
            
            if (mode === 'sim') {
                if (arduinoConnected) {
                    disconnectArduino();
                }
                addSampleTargets();
            }
        }
        
        // Target Management
        function addTarget(angle, distance) {
            let rad = (angle - 90) * Math.PI / 180;
            let x = Math.cos(rad) * distance * 2.5;
            let y = Math.sin(rad) * distance * 2.5;
            
            // Scale distance to canvas
            let scale = radarRadius / 100;
            x *= scale;
            y *= scale;
            
            targets.push({
                x: x,
                y: y,
                angle: angle,
                distance: distance,
                life: 255,
                detectionIntensity: 0,
                size: 10
            });
        }
        
        function addRandomTarget() {
            let angle = Math.random() * 150 + 15;
            let distance = Math.random() * 80 + 20;
            addTarget(angle, distance);
        }
        
        function clearTargets() {
            targets = [];
            particles = [];
        }
        
        function addSampleTargets() {
            clearTargets();
            addTarget(30, 30);
            addTarget(90, 45);
            addTarget(150, 25);
            addTarget(60, 60);
            addTarget(120, 35);
        }
        
        // Touch interaction
        document.getElementById('radarCanvas').addEventListener('click', (e) => {
            if (currentMode === 'sim') {
                let rect = canvas.getBoundingClientRect();
                let scaleX = canvas.width / rect.width;
                let scaleY = canvas.height / rect.height;
                
                let mouseX = (e.clientX - rect.left) * scaleX;
                let mouseY = (e.clientY - rect.top) * scaleY;
                
                let dx = mouseX - radarX;
                let dy = mouseY - radarY;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if (distance < radarRadius) {
                    let angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
                    if (angle < 0) angle += 360;
                    if (angle > 180) angle = 360 - angle;
                    
                    let distCM = Math.round((distance / radarRadius) * 100);
                    addTarget(angle, distCM);
                }
            }
        });
        
        // Arduino Web Serial API
        async function setupSerial() {
            if ('serial' in navigator) {
                let ports = await navigator.serial.getPorts();
                let select = document.getElementById('portSelect');
                
                if (ports.length > 0) {
                    for (let port of ports) {
                        let info = port.getInfo();
                        select.innerHTML += `<option value="${port}">${info.usbProductId || 'Unknown'}</option>`;
                    }
                } else {
                    select.innerHTML += '<option value="">No ports found</option>';
                }
            } else {
                alert('Web Serial API not supported. Use Chrome/Edge browser.');
            }
        }
        
        async function connectArduino() {
            try {
                if (!arduinoConnected) {
                    serialPort = await navigator.serial.requestPort();
                    await serialPort.open({ baudRate: 9600 });
                    
                    arduinoConnected = true;
                    document.getElementById('connectBtn').textContent = 'Disconnect';
                    document.getElementById('connectionStatus').innerHTML = '🟢 Connected';
                    
                    // Start reading data
                    readSerialData();
                } else {
                    await serialPort.close();
                    arduinoConnected = false;
                    document.getElementById('connectBtn').textContent = 'Connect';
                    document.getElementById('connectionStatus').innerHTML = '🔴 Disconnected';
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function readSerialData() {
            while (arduinoConnected && serialPort.readable) {
                const reader = serialPort.readable.getReader();
                
                try {
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;
                        
                        // Parse Arduino data
                        let text = new TextDecoder().decode(value);
                        let lines = text.split('\n');
                        
                        for (let line of lines) {
                            if (line.includes(',')) {
                                let [angle, distance] = line.split(',').map(Number);
                                if (!isNaN(angle) && !isNaN(distance)) {
                                    // Update radar with Arduino data
                                    scanAngle = angle;
                                    if (distance < 200) {
                                        addTarget(angle, distance);
                                    }
                                }
                            }
                        }
                    }
                } catch (error) {
                    console.error('Error reading serial:', error);
                } finally {
                    reader.releaseLock();
                }
            }
        }
        
        // Initialize
        window.onload = () => {
            initCanvas();
            setupSerial();
        };
    </script>
</body>
</html>
